  <title>دخول إدارة مزين مصر</title>
  <script type="module" crossorigin src="/assets/login-C8z9IIJW.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/index.esm-CI8auOvv.js">

<body class="login-page">
  <main class="login-shell">
    <a class="login-back" href="/">← العودة للموقع</a>
    <form class="login-card" id="loginForm" novalidate>
      <img src="/assets/el-mezaen-mark-v2.png" alt="رمز مزين مصر" width="130" height="154">
      <span>EL MEZAEN • TALKHA</span>
      <h1>لوحة إدارة مزين مصر</h1>
      <p>سجّل الدخول بحساب Firebase المصرح له.</p>
      <label><b>البريد الإلكتروني</b><input id="email" type="email" autocomplete="username" required placeholder="admin@example.com"></label>
      <label><b>كلمة المرور</b><input id="password" type="password" autocomplete="current-password" required placeholder="••••••••"></label>
      <p class="login-error" id="loginError" role="alert"></p>
      <button class="login-button" type="submit">دخول آمن</button>
      <small>لا يتم حفظ كلمة المرور داخل الموقع أو JavaScript.</small>
    </form>
  </main>
  <script src="/firebase-config.js"></script>
</body>
